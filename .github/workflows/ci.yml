name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        # Using `npm install` instead of `npm ci` because per-platform
        # optional dependencies (e.g. @esbuild/* binaries) can legitimately
        # differ across Linux/macOS/Windows in ways that make `npm ci`'s
        # strict lockfile check fail spuriously. `npm install` is still
        # reproducible for first-order deps; it just tolerates optional
        # platform binaries being added/removed.
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test (TS suite)
        run: npm run test:ts

      - name: Test (exhaustive type-level)
        run: npm run test:exhaustive

      - name: Test (JS/MJS suite)
        run: npm run test:mjs

      - name: Test (CJS smoke)
        run: npm run test:cjs:run

  publish-check:
    name: Dry-run publish
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Pack (dry-run)
        run: npm pack --dry-run

      - name: Validate exports map
        run: |
          node -e "
            const pkg = require('./package.json');
            const exp = pkg.exports['.'];
            if (!exp.types) throw new Error('exports types missing');
            if (!exp.import) throw new Error('exports import missing');
            if (!exp.require) throw new Error('exports require missing');
            console.log('exports map OK:', JSON.stringify(exp, null, 2));
          "
